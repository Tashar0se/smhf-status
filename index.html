  #gate button{width:100%;padding:13px;font-size:15px;font-weight:700;border:0;border-radius:10px;

</style>

const KEY = "smhf_pc";
const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pass){
  const salt = dec(DATA.s), iv = dec(DATA.i), ct = dec(DATA.c);
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:DATA.n, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return new TextDecoder().decode(pt);
}
async function tryPass(pass, remember){
  try{
    const html = await unlock(pass);
    document.open(); document.write(html); document.close();
    if(remember) localStorage.setItem(KEY, pass);
    return true;
  }catch(e){ return false; }
}
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  const pc = document.getElementById("pc").value;
  const ok = await tryPass(pc, true);
  if(!ok) document.getElementById("err").textContent = "Wrong passcode — try again.";
});
(async () => {
  const saved = localStorage.getItem(KEY);
  if(saved){ const ok = await tryPass(saved, false); if(!ok) localStorage.removeItem(KEY); }
})();
